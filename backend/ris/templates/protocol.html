<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ _("Протокол исследования") }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: white; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: #333; margin-bottom: 16px; font-size: 22px; }
        h3 { color: #555; margin-bottom: 8px; font-size: 15px; margin-top: 12px; }
        .meta { display: grid; grid-template-columns: 200px 1fr; gap: 8px 16px; font-size: 14px; margin-bottom: 16px; }
        .meta span:nth-child(odd) { color: #888; }
        .meta span:nth-child(even) { color: #333; font-family: monospace; }
        textarea { width: 100%; min-height: 200px; padding: 12px; font-family: 'Consolas', monospace; font-size: 13px; border: 1px solid #ddd; border-radius: 6px; resize: vertical; }
        textarea:focus { border-color: #667eea; outline: none; }
        .btn { padding: 10px 24px; background: #667eea; color: white; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; margin-right: 8px; }
        .btn:hover { background: #5a6fd6; }
        .btn-sign { background: #28a745; }
        .btn-sign:hover { background: #218838; }
        .signed { background: #d4edda; color: #155724; padding: 12px; border-radius: 6px; border: 1px solid #c3e6cb; margin-bottom: 12px; }
        .nav { margin-bottom: 12px; }
        .nav a { color: #667eea; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav"><a href="/studies">{{ _("← К списку исследований") }}</a></div>
        <div class="card">
            <h1>{{ _("📝 Протокол исследования") }}</h1>
            <div id="orderMeta" class="meta">{{ _("⏳ Загрузка…") }}</div>
        </div>
        <div class="card">
            <h3>{{ _("Заключение") }}</h3>
            <textarea id="bodyField" placeholder="{{ _("Описание исследования…") }}"></textarea>
            <h3>{{ _("Вывод / рекомендации") }}</h3>
            <textarea id="impressionField" placeholder="{{ _("Краткий вывод…") }}" style="min-height:80px;"></textarea>
            <div style="margin-top: 16px;">
                <button class="btn" onclick="save()">{{ _("💾 Сохранить (черновик)") }}</button>
                <button class="btn btn-sign" onclick="sign()">{{ _("✓ Подписать") }}</button>
            </div>
            <div id="statusBox" style="margin-top: 12px;"></div>
        </div>
    </div>

    <script>
    const ORDER_ID = "{{ order_id }}";
    const api = {
        h() { const t = localStorage.getItem("access_token");
              return t ? { "Content-Type": "application/json", "Authorization": "Bearer " + t } : { "Content-Type": "application/json" }; },
        async get(u)  { return (await fetch(u, { method: "GET",  headers: this.h() })).json(); },
        async put(u, b) { return (await fetch(u, { method: "PUT",  headers: this.h(), body: JSON.stringify(b) })).json(); },
        async post(u, b) { return (await fetch(u, { method: "POST", headers: this.h(), body: JSON.stringify(b) })); },
    };

    async function load() {
        const o = await api.get(`/api/orders/${ORDER_ID}`);
        document.getElementById("orderMeta").innerHTML = `
            <span>Order ID:</span><span>${o.id}</span>
            <span>Study UID:</span><span>${o.study_uid}</span>
            <span>{{ _("Модальность:") }}</span><span>${o.modality}</span>
            <span>{{ _("Описание:") }}</span><span>${o.study_description || "—"}</span>
            <span>{{ _("Направитель:") }}</span><span>${o.referring_physician || "—"}</span>
            <span>{{ _("Статус:") }}</span><span>${o.status}</span>
            <span>{{ _("Приоритет:") }}</span><span>${o.priority}</span>
        `;
        const p = await api.get(`/api/orders/${ORDER_ID}/protocol`);
        if (p.body) document.getElementById("bodyField").value = p.body;
        if (p.impression) document.getElementById("impressionField").value = p.impression;
        if (!p.is_draft) {
            document.getElementById("statusBox").innerHTML = `<div class="signed">
                {{ _("✅ Протокол подписан") }} ${p.signed_at ? p.signed_at.substring(0, 16).replace("T", " ") : ""}
            </div>`;
            document.getElementById("bodyField").disabled = true;
            document.getElementById("impressionField").disabled = true;
        }
    }

    async function save() {
        const r = await api.put(`/api/orders/${ORDER_ID}/protocol`, {
            body: document.getElementById("bodyField").value,
            impression: document.getElementById("impressionField").value,
        });
        if (r.detail) { alert(r.detail); return; }
        document.getElementById("statusBox").innerHTML = "<span style='color:green'>{{ _("✓ Сохранено") }}</span>";
    }

    async function sign() {
        if (!confirm("{{ _("После подписания протокол нельзя редактировать. Продолжить?") }}")) return;
        await save();
        const r = await api.post(`/api/orders/${ORDER_ID}/protocol/sign`, {});
        const data = await r.json();
        if (data.detail) { alert(data.detail); return; }
        location.reload();
    }

    load();
    </script>
</body>
</html>
