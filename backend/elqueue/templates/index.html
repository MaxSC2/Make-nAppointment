<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Электронная очередь — регистратура</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; padding: 30px 20px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-radius: 12px 12px 0 0; }
        .header h1 { font-size: 28px; margin-bottom: 5px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .nav { background: #fff; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .nav a { color: #667eea; text-decoration: none; margin-right: 14px; font-size: 14px; }
        .nav .user { font-size: 13px; color: #555; }
        .nav .user button { background: none; border: 1px solid #ccc; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .card { background: white; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .card h3 { margin-bottom: 16px; color: #333; font-size: 18px; }
        .form-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
        .form-row input, .form-row select {
            flex: 1; min-width: 200px; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px;
            font-size: 14px; transition: border 0.2s;
        }
        .form-row input:focus, .form-row select:focus { border-color: #667eea; outline: none; }
        .btn { padding: 10px 24px; background: #667eea; color: white; border: none; border-radius: 6px;
               font-size: 15px; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #5a6fd6; }
        .ticket-result { display: none; margin-top: 16px; padding: 16px; background: #d4edda; border-radius: 8px; border: 1px solid #c3e6cb; }
        .ticket-result.show { display: block; }
        .ticket-number { font-size: 32px; font-weight: bold; color: #155724; letter-spacing: 3px; }
        .ticket-info { margin-top: 8px; color: #155724; font-size: 14px; }
        .queue-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .queue-table th { background: #667eea; color: white; padding: 12px 16px; text-align: left; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        .queue-table td { padding: 10px 16px; border-bottom: 1px solid #eee; font-size: 14px; }
        .queue-table tr:hover td { background: #f8f9ff; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .status-badge.waiting { background: #fff3cd; color: #856404; }
        .status-badge.in_progress { background: #cce5ff; color: #004085; }
        .status-badge.done { background: #d4edda; color: #155724; }
        .status-badge.cancelled { background: #f8d7da; color: #721c24; }
        .empty-queue { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 Электронная очередь</h1>
            <p>Городская больница №1 — Отделение лучевой диагностики</p>
        </div>

        <div class="nav">
            <div>
                <a href="/">Регистратура</a>
                <a href="/admin">Панель врача</a>
            </div>
            <div class="user" id="userBox">
                <a href="/login">🔐 Войти</a>
            </div>
        </div>

        <div class="card">
            <h3>📝 Запись на исследование</h3>
            <form id="registerForm">
                <div class="form-row">
                    <input name="full_name" placeholder="ФИО пациента" required>
                    <input name="policy_number" placeholder="Номер полиса / ID" required>
                    <input name="phone" placeholder="Телефон (необязательно)">
                </div>
                <div class="form-row">
                    <select name="cabinet_code" id="cabinetSelect" required>
                        <option value="">— загрузка кабинетов —</option>
                    </select>
                </div>
                <button type="submit" class="btn">🔖 Получить талон</button>
            </form>
            <div class="ticket-result" id="ticketResult">
                <div style="font-size: 14px; color: #155724;">✅ Вы записаны!</div>
                <div class="ticket-number" id="ticketNumber">—</div>
                <div class="ticket-info" id="ticketInfo"></div>
            </div>
        </div>

        <div class="card" style="border-radius: 0 0 12px 12px;">
            <h3>
                📋 Текущая очередь
                <select id="filterCabinet" style="margin-left: 12px; padding: 4px 8px; font-size: 13px; border: 1px solid #ddd; border-radius: 4px;">
                    <option value="">Все кабинеты</option>
                </select>
            </h3>
            <div id="queueContainer">
                <div class="empty-queue">⏳ Загрузка…</div>
            </div>
        </div>
    </div>

    <script>
    // ======================== API CLIENT ========================
    const api = {
        headers() {
            const token = localStorage.getItem("access_token");
            return token
                ? { "Content-Type": "application/json", "Authorization": "Bearer " + token }
                : { "Content-Type": "application/json" };
        },
        async get(url)  { return (await fetch(url,  { method: "GET",  headers: this.headers() })).json(); },
        async post(url, body) { return (await fetch(url, { method: "POST", headers: this.headers(), body: JSON.stringify(body) })).json(); },
    };

    function statusBadge(s) {
        const map = { waiting: "⏳ Ожидание", in_progress: "🔵 На приёме", done: "✅ Готово", cancelled: "❌ Отменён" };
        return `<span class="status-badge ${s}">${map[s] || s}</span>`;
    }

    function fmtTime(iso) { return iso ? iso.substring(0, 16).replace("T", " ") : "—"; }

    // ======================== ЗАГРУЗКА СПРАВОЧНИКОВ ========================
    async function loadCabinets() {
        const data = await api.get("/api/cabinets");
        const sel = document.getElementById("cabinetSelect");
        const filter = document.getElementById("filterCabinet");
        sel.innerHTML = data.map(c =>
            `<option value="${c.code}">Кабинет ${c.code} — ${c.name} (${c.modality})</option>`
        ).join("");
        filter.innerHTML = '<option value="">Все кабинеты</option>' + data.map(c =>
            `<option value="${c.code}">Кабинет ${c.code} — ${c.name}</option>`
        ).join("");
        const params = new URLSearchParams(location.search);
        if (params.get("cabinet")) filter.value = params.get("cabinet");
    }

    // ======================== ОЧЕРЕДЬ ========================
    async function loadQueue() {
        const cab = document.getElementById("filterCabinet").value;
        const url = "/api/tickets" + (cab ? "?cabinet=" + cab : "");
        const data = await api.get(url);
        const container = document.getElementById("queueContainer");
        if (!data.length) {
            container.innerHTML = '<div class="empty-queue">👤 Очередь пуста.</div>';
            return;
        }
        let html = '<table class="queue-table"><thead><tr><th>Талон</th><th>Пациент</th><th>Кабинет</th><th>Статус</th><th>Создан</th></tr></thead><tbody>';
        for (const t of data) {
            html += `<tr>
                <td><strong>${t.ticket_number}</strong></td>
                <td>${t.patient.full_name}</td>
                <td>${t.cabinet.code} — ${t.cabinet.name}</td>
                <td>${statusBadge(t.status)}</td>
                <td>${fmtTime(t.created_at)}</td>
            </tr>`;
        }
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    // ======================== РЕГИСТРАЦИЯ ========================
    document.getElementById("registerForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        const fd = new FormData(this);
        const body = {
            full_name: fd.get("full_name"),
            policy_number: fd.get("policy_number"),
            phone: fd.get("phone") || null,
            cabinet_code: fd.get("cabinet_code"),
        };
        const btn = this.querySelector("button");
        btn.disabled = true; btn.textContent = "⏳ Отправка...";
        try {
            const t = await api.post("/api/tickets", body);
            if (t.detail) { alert("Ошибка: " + t.detail); return; }
            document.getElementById("ticketResult").classList.add("show");
            document.getElementById("ticketNumber").textContent = t.ticket_number;
            document.getElementById("ticketInfo").innerHTML =
                `Пациент: ${t.patient.full_name}<br>
                 Кабинет: ${t.cabinet.code} — ${t.cabinet.name}<br>
                 Статус: <strong>${t.status}</strong><br>
                 ${t.order_id ? `Заказ RIS: <code>${t.order_id}</code>` : "⚠ RIS недоступен, талон сохранён"}`;
            setTimeout(loadQueue, 500);
        } catch (err) {
            alert("Ошибка: " + err.message);
        } finally {
            btn.disabled = false; btn.textContent = "🔖 Получить талон";
        }
    });

    document.getElementById("filterCabinet").addEventListener("change", loadQueue);

    // ======================== USER ========================
    async function loadUser() {
        const token = localStorage.getItem("access_token");
        if (!token) return;
        try {
            const u = await api.get("/api/auth/me");
            document.getElementById("userBox").innerHTML =
                `<span>👤 ${u.full_name} (${u.role_codes.join(", ")})</span>
                 <button onclick="logout()">Выйти</button>`;
        } catch { localStorage.removeItem("access_token"); }
    }
    function logout() {
        const refresh = localStorage.getItem("refresh_token");
        if (refresh) api.post("/api/auth/logout", { refresh_token: refresh });
        localStorage.clear();
        location.reload();
    }

    // ======================== INIT ========================
    (async () => {
        await loadCabinets();
        await loadQueue();
        await loadUser();
    })();
    </script>
</body>
</html>
