# Alembic config — параметры читаются из .env

[alembic]
# Путь к скриптам миграций
script_location = alembic

# Шаблон имени файла миграции
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Часовой пояс для генерации timestamp-имён
timezone = Europe/Moscow

# Максимальная длина slug в имени файла
truncate_slug_length = 40

# SQLAlchemy URL — заполняется из env.py (читает .env)
sqlalchemy.url =

# ID префиксов (revision_file_prefix, version_path_separator)
revision_environment = false
sourceless = false
version_path_separator = os

# Логирование
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
